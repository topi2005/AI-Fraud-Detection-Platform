# docker-compose.prod.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Overrides for production:
#   - Hardened multi-stage images
#   - CPU/memory limits
#   - Structured JSON logging → CloudWatch
#   - Secrets from environment (never hardcoded)
#   - Grafana + Prometheus monitoring stack
#   - No exposed ports except load-balanced ones

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: []           # not exposed in prod — accessed via internal DNS
    deploy:
      resources:
        limits:   { cpus: "1.0", memory: 1G }
        reservations: { memory: 512M }
    logging:
      driver: awslogs
      options:
        awslogs-group:  /fraud-detection/postgres
        awslogs-region: ${AWS_REGION:-us-east-1}

  redis:
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    ports: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 640M }

  kafka:
    environment:
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1.5G }
        reservations: { memory: 768M }

  api:
    build:
      context:    .
      dockerfile: Dockerfile.api
    image: ${ECR_REGISTRY}/fraud-api:${IMAGE_TAG:-latest}
    ports: []         # traffic enters via ALB → ECS target group
    environment:
      POSTGRES_HOST:           postgres
      POSTGRES_PASSWORD:       ${POSTGRES_PASSWORD}
      REDIS_HOST:              redis
      REDIS_PASSWORD:          ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SECRET_KEY:              ${SECRET_KEY}
      ENVIRONMENT:             production
      DEBUG:                   "false"
    deploy:
      replicas: 2
      resources:
        limits:   { cpus: "1.0", memory: 1.5G }
        reservations: { memory: 512M }
      restart_policy:
        condition: on-failure
        max_attempts: 3
    logging:
      driver: awslogs
      options:
        awslogs-group:         /fraud-detection/api
        awslogs-region:        ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: api

  worker:
    build:
      context:    .
      dockerfile: Dockerfile.api
    image: ${ECR_REGISTRY}/fraud-api:${IMAGE_TAG:-latest}
    command: ["python", "worker.py"]
    environment:
      POSTGRES_HOST:           postgres
      POSTGRES_PASSWORD:       ${POSTGRES_PASSWORD}
      REDIS_HOST:              redis
      REDIS_PASSWORD:          ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ENVIRONMENT:             production
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "0.5", memory: 1G }
    logging:
      driver: awslogs
      options:
        awslogs-group:         /fraud-detection/worker
        awslogs-region:        ${AWS_REGION:-us-east-1}
        awslogs-stream-prefix: worker

  dashboard:
    build:
      context:    .
      dockerfile: Dockerfile.dashboard
    image: ${ECR_REGISTRY}/fraud-dashboard:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }

  # ── Monitoring ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: fraud_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fraud_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
